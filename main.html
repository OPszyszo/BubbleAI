<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bubble AI</title>
<link rel="icon" type="image/png" href="assets/logo.png">
<style>
/* ten sam CSS co poprzednio – nie zmieniam go dla czytelności, ale zostawiam ten sam */
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
:root{--bg:#07111f;--bg2:#0c1b2f;--card:rgba(255,255,255,0.06);--text:#fff;--accent:#5cb8ff;--border:rgba(255,255,255,0.08)}
body.light{--bg:#edf4ff;--bg2:#d9e7ff;--card:rgba(255,255,255,0.75);--text:#111;--accent:#267cff;--border:rgba(0,0,0,0.08)}
body{width:100%;height:100vh;overflow:hidden;font-family:'Segoe UI',sans-serif;background:radial-gradient(circle at top,var(--bg2),var(--bg));color:var(--text)}
.view{width:100%;height:100%;position:relative}
.hidden{display:none!important}
#loginView{position:relative;width:100%;height:100%;overflow:hidden}
#bubbleCanvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;cursor:crosshair}
.glass-panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;max-width:480px;background:rgba(10,20,35,0.7);backdrop-filter:blur(18px);border-radius:48px;border:1px solid rgba(92,184,255,0.4);padding:2rem 1.8rem;z-index:20}
.big-logo{text-align:center;margin-bottom:1rem}
.big-logo img{max-width:85%;height:auto}
.tab-bar{display:flex;gap:12px;margin:20px 0 24px;background:rgba(0,0,0,0.25);border-radius:100px;padding:5px}
.tab{flex:1;text-align:center;padding:12px 0;border-radius:40px;font-weight:600;cursor:pointer;color:rgba(255,255,255,0.7)}
.tab.active{background:rgba(92,184,255,0.35);color:#fff}
.input-group{margin-bottom:18px}
.input-group input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);padding:16px 18px;border-radius:36px;font-size:1rem;color:#fff;outline:none}
.input-group input:focus{border-color:#5cb8ff}
.action-btn{width:100%;background:linear-gradient(135deg,#5cb8ff,#8f66ff);border:none;padding:16px;border-radius:40px;font-weight:bold;font-size:1.1rem;color:#fff;cursor:pointer;margin-top:12px}
.action-btn:hover{transform:scale(1.02)}
.info-text{text-align:center;margin-top:20px;font-size:.8rem;color:rgba(255,255,255,0.6)}
.app{display:flex;width:100%;height:100vh}
.sidebar{width:300px;background:rgba(0,0,0,0.15);border-right:1px solid var(--border);backdrop-filter:blur(20px);padding:20px;display:flex;flex-direction:column;gap:16px}
.logo-img{text-align:center;margin-bottom:10px}
.logo-img img{max-width:100%;max-height:70px;object-fit:contain}
.card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:18px;backdrop-filter:blur(10px)}
.card h3{margin-bottom:14px;font-size:15px}
.model-select{width:100%;padding:12px 16px;border-radius:28px;background:#0f1a2c;color:#fff;border:1px solid rgba(92,184,255,0.4);outline:none;cursor:pointer;font-weight:600;font-size:14px;transition:0.2s;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");background-repeat:no-repeat;background-position:right 16px center;background-size:16px}
.model-select:hover{background:#14263f;border-color:#5cb8ff}
.model-select option{background:#0f1a2c;color:#fff}
button{width:100%;padding:14px;border:none;border-radius:14px;cursor:pointer;font-weight:700;background:linear-gradient(135deg,#5ab2ff,#8f66ff);color:#fff}
button:hover{transform:scale(1.02)}
.conversations-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-top:12px}
.conv-item{background:rgba(255,255,255,0.05);border-radius:12px;padding:12px;font-size:14px;cursor:pointer;border-left:3px solid transparent}
.conv-item.active-conv{background:rgba(92,184,255,0.2);border-left-color:var(--accent)}
.conv-title{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main{flex:1;display:flex;flex-direction:column}
.topbar{height:80px;display:flex;align-items:center;justify-content:space-between;padding:0 25px;border-bottom:1px solid var(--border);backdrop-filter:blur(10px)}
.model{font-size:18px;font-weight:700}
.user-area{display:flex;gap:12px;align-items:center}
.user{background:var(--card);border:1px solid var(--border);padding:8px 16px;border-radius:12px}
.logout-btn{background:rgba(255,80,80,0.2);color:#ff9e8f;padding:8px 14px;width:auto}
.chat{flex:1;overflow-y:auto;padding:30px;display:flex;flex-direction:column;gap:18px}
.message{max-width:75%;padding:18px;border-radius:22px;line-height:1.6;animation:fade .25s ease}
.user-msg{align-self:flex-end;background:linear-gradient(135deg,#5ab2ff,#8f66ff);color:#fff}
.ai-msg{align-self:flex-start;background:var(--card);border:1px solid var(--border)}
.ai-msg strong,.ai-msg em,.ai-msg code{color:inherit}
.bottom{padding:20px;display:flex;gap:12px;border-top:1px solid var(--border)}
.bottom input{flex:1;padding:14px;border:none;border-radius:14px;outline:none;background:rgba(255,255,255,0.08);color:var(--text)}
.send-btn{width:auto;padding:14px 24px}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:900px){.sidebar{display:none}.message{max-width:90%}}
</style>
</head>
<body>
<div id="loginView" class="view">
<canvas id="bubbleCanvas"></canvas>
<div class="glass-panel">
<div class="big-logo"><img src="assets/logo_2.png" alt="Bubble AI" onerror="this.style.display='none'"></div>
<div class="tab-bar"><div class="tab active" data-tab="login">🔐 Logowanie</div><div class="tab" data-tab="register">✨ Rejestracja</div></div>
<div id="loginForm"><div class="input-group"><input type="text" id="loginUsername" placeholder="Nazwa użytkownika"></div><div class="input-group"><input type="password" id="loginPassword" placeholder="Hasło"></div><button class="action-btn" id="doLoginBtn">➡ Zaloguj się</button></div>
<div id="registerForm" style="display:none;"><div class="input-group"><input type="text" id="regUsername" placeholder="Nowa nazwa"></div><div class="input-group"><input type="password" id="regPassword" placeholder="Hasło"></div><div class="input-group"><input type="password" id="regConfirm" placeholder="Powtórz hasło"></div><button class="action-btn" id="doRegisterBtn">✨ Załóż konto</button></div>
<div class="info-text">🔒 Dane przechowywane lokalnie</div>
</div></div>
<div id="chatView" class="view hidden"><div class="app"><div class="sidebar"><div class="logo-img"><img src="assets/logo_2.png" alt="Bubble AI" onerror="this.style.display='none'"></div><div class="card"><h3>🧠 Model</h3><select id="modelSelect" class="model-select"><option value="bubble2">Bubble 2.1</option><option value="bubble1" selected>Bubble 1.4</option></select></div><div class="card"><h3>🎨 Motyw</h3><button id="themeToggleBtn">☀️ Dark / Light</button></div><div class="card" style="flex:1; display:flex; flex-direction:column;"><h3>💬 Twoje rozmowy</h3><button id="newChatBtn" style="margin-bottom:14px;">+ Nowy Czat</button><div id="conversationsList" class="conversations-list"></div></div></div><div class="main"><div class="topbar"><div class="model" id="modelDisplay">Bubble 1.4</div><div class="user-area"><div class="user" id="userDisplay"></div><button id="logoutBtn" class="logout-btn">Wyloguj</button></div></div><div class="chat" id="chat"></div><div class="bottom"><input type="text" id="messageInput" placeholder="Zadaj pytanie..."><button class="send-btn" id="sendMsgBtn">Wyślij</button></div></div></div></div>
<script>
(function(){
const V=document,W=window;let U=V.getElementById.bind(V);
let loginView=U('loginView'),chatView=U('chatView'),canvas=U('bubbleCanvas'),ctx=canvas.getContext('2d');
let bubbles=[],animFrame,w,h;
function rand(a,b){return a+Math.random()*(b-a);}
function createBubble(x,y,r,vx,vy){return{x,y,r,vx,vy,color:`hsla(${rand(180,240)},70%,65%,0.7)`};}
function initBubbles(){let arr=[];for(let i=0;i<24;i++){let r=rand(12,38);arr.push(createBubble(rand(r,w-r),rand(r,h-r),r,rand(-0.9,0.9),rand(-0.9,0.9)));}return arr;}
function popBubble(i){if(i>=bubbles.length)return;bubbles.splice(i,1);if(bubbles.length<6){for(let i=0;i<4;i++){let r=rand(12,38);bubbles.push(createBubble(rand(r,w-r),rand(r,h-r),r,rand(-0.9,0.9),rand(-0.9,0.9)));}}}
function handleCollisions(){let any=false;for(let i=0;i<bubbles.length;i++){for(let j=i+1;j<bubbles.length;j++){let a=bubbles[i],b=bubbles[j];if(Math.hypot(a.x-b.x,a.y-b.y)<a.r+b.r){popBubble(j);popBubble(i);any=true;break;}}if(any)break;}return any;}
function handleWall(){let any=false;for(let i=0;i<bubbles.length;i++){let b=bubbles[i];if(b.x-b.r<=0||b.x+b.r>=w||b.y-b.r<=0||b.y+b.r>=h){popBubble(i);any=true;i--;}}return any;}
function moveBubbles(){for(let b of bubbles){b.x+=b.vx;b.y+=b.vy;b.x=Math.min(Math.max(b.x,b.r),w-b.r);b.y=Math.min(Math.max(b.y,b.r),h-b.r);}}
function drawBubbles(){ctx.clearRect(0,0,w,h);for(let b of bubbles){ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle=b.color;ctx.shadowBlur=12;ctx.fill();ctx.shadowBlur=0;ctx.beginPath();ctx.arc(b.x-b.r*0.2,b.y-b.r*0.2,b.r*0.2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.8)';ctx.fill();}}
function animateBubbles(){moveBubbles();let coll=true,iter=0;while(coll&&iter++<5){coll=false;if(handleCollisions())coll=true;if(handleWall())coll=true;}drawBubbles();animFrame=requestAnimationFrame(animateBubbles);}
function resizeCanvas(){w=W.innerWidth;h=W.innerHeight;canvas.width=w;canvas.height=h;if(bubbles.length===0)bubbles=initBubbles();else{for(let b of bubbles){b.x=Math.min(Math.max(b.x,b.r),w-b.r);b.y=Math.min(Math.max(b.y,b.r),h-b.r);}}}
canvas.addEventListener('click',(e)=>{let rect=canvas.getBoundingClientRect(),scaleX=canvas.width/rect.width,scaleY=canvas.height/rect.height,mouseX=(e.clientX-rect.left)*scaleX,mouseY=(e.clientY-rect.top)*scaleY;for(let i=0;i<bubbles.length;i++){let b=bubbles[i];if(Math.hypot(mouseX-b.x,mouseY-b.y)<b.r){popBubble(i);break;}}});
W.addEventListener('resize',()=>{resizeCanvas();});
let users=[];
function getUsers(){let r=localStorage.getItem('bubble_users');return r?JSON.parse(r):[];}
function saveUsers(u){localStorage.setItem('bubble_users',JSON.stringify(u));}
function register(u,p){let us=getUsers();if(us.find(x=>x.username===u))return false;us.push({username:u,password:p});saveUsers(us);return true;}
function login(u,p){let us=getUsers();return !!us.find(x=>x.username===u&&x.password===p);}
let currentUser=null;
function showChatView(){loginView.classList.add('hidden');chatView.classList.remove('hidden');if(animFrame)cancelAnimationFrame(animFrame);initChatApp();}
function showLoginView(){chatView.classList.add('hidden');loginView.classList.remove('hidden');if(!ctx)ctx=canvas.getContext('2d');resizeCanvas();bubbles=initBubbles();if(animFrame)cancelAnimationFrame(animFrame);animateBubbles();}
let conversations=[],activeConvId=null;
function formatMarkdown(t){let h=t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');h=h.replace(/\*(.*?)\*/g,'<em>$1</em>');h=h.replace(/`(.*?)`/g,'<code style="background:rgba(0,0,0,0.2);padding:2px 6px;border-radius:8px;">$1</code>');h=h.replace(/^### (.*?)$/gm,'<h3>$1</h3>');h=h.replace(/^## (.*?)$/gm,'<h2>$1</h2>');h=h.replace(/^- (.*?)$/gm,'<li>$1</li>');if(h.includes('<li>'))h=h.replace(/(<li>.*<\/li>)/s,'<ul>$1</ul>');h=h.replace(/\n/g,'<br>');return h;}
function addMessageToChatDOM(content,type,isMarkdown=true){let chatDiv=U('chat'),msgDiv=V.createElement('div');msgDiv.className=`message ${type}`;if(type==='ai-msg'&&isMarkdown)msgDiv.innerHTML=formatMarkdown(content);else msgDiv.innerText=content;chatDiv.appendChild(msgDiv);chatDiv.scrollTop=chatDiv.scrollHeight;}
function loadUserConversations(){let key='bubble_conv_'+currentUser;let stored=localStorage.getItem(key);if(stored){conversations=JSON.parse(stored);}else{conversations=[{id:Date.now(),title:"Witaj w Bubble AI",messages:[{role:"ai",content:"Cześć! Możesz pisać w **markdown** – pytaj o wszystko."}]}];}if(!conversations.length)conversations.push({id:Date.now(),title:"Nowy czat",messages:[]});if(!activeConvId||!conversations.find(c=>c.id===activeConvId))activeConvId=conversations[0].id;saveConversations();}
function saveConversations(){localStorage.setItem('bubble_conv_'+currentUser,JSON.stringify(conversations));}
function renderConvList(){let container=U('conversationsList');container.innerHTML='';conversations.forEach(conv=>{let div=V.createElement('div');div.className='conv-item';if(conv.id===activeConvId)div.classList.add('active-conv');let titleSpan=V.createElement('div');titleSpan.className='conv-title';titleSpan.innerText=conv.title.length>28?conv.title.slice(0,25)+'...':conv.title;div.appendChild(titleSpan);div.addEventListener('click',()=>switchConversation(conv.id));container.appendChild(div);});}
function switchConversation(id){activeConvId=id;renderConvList();renderCurrentChat();}
function renderCurrentChat(){let chatDiv=U('chat');chatDiv.innerHTML='';let conv=conversations.find(c=>c.id===activeConvId);if(!conv)return;for(let msg of conv.messages){let type=msg.role==='user'?'user-msg':'ai-msg';addMessageToChatDOM(msg.content,type,msg.role==='ai');}}
async function sendMessage(){let input=U('messageInput'),text=input.value.trim();if(!text)return;let conv=conversations.find(c=>c.id===activeConvId);if(!conv)return;conv.messages.push({role:'user',content:text});saveConversations();renderCurrentChat();input.value='';if(conv.messages.length===1&&(conv.title==="Nowy czat"||conv.title==="Witaj w Bubble AI")){conv.title=text.length>30?text.slice(0,27)+'...':text;renderConvList();}let modelSelect=U('modelSelect');let selected=modelSelect.value;try{let resp=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,model:selected})});let data=await resp.json();let reply=data.reply||"Brak odpowiedzi z serwera.";conv.messages.push({role:'ai',content:reply});saveConversations();renderCurrentChat();}catch(err){conv.messages.push({role:'ai',content:"❌ Błąd połączenia z serwerem."});saveConversations();renderCurrentChat();}}
function newConversation(){let newId=Date.now();conversations.unshift({id:newId,title:"Nowy czat",messages:[]});activeConvId=newId;saveConversations();renderConvList();renderCurrentChat();}
function toggleTheme(){V.body.classList.toggle('light');localStorage.setItem('bubbleTheme',V.body.classList.contains('light')?'light':'dark');}
function initChatApp(){if(!currentUser)return;U('userDisplay').innerText=currentUser;loadUserConversations();renderConvList();renderCurrentChat();U('newChatBtn').onclick=()=>newConversation();U('logoutBtn').onclick=()=>{localStorage.removeItem('bubble_current_user');currentUser=null;showLoginView();};U('sendMsgBtn').onclick=sendMessage;U('messageInput').onkeydown=(e)=>{if(e.key==='Enter')sendMessage();};U('themeToggleBtn').onclick=toggleTheme;let savedTheme=localStorage.getItem('bubbleTheme');if(savedTheme==='light')V.body.classList.add('light');let modelSelect=U('modelSelect');let modelDisplay=U('modelDisplay');modelSelect.addEventListener('change',()=>{modelDisplay.innerText=modelSelect.options[modelSelect.selectedIndex].text;});}
let loginTab=V.querySelector('[data-tab="login"]'),regTab=V.querySelector('[data-tab="register"]'),loginFormDiv=U('loginForm'),registerFormDiv=U('registerForm');
function setActiveTab(t){if(t==='login'){loginTab.classList.add('active');regTab.classList.remove('active');loginFormDiv.style.display='block';registerFormDiv.style.display='none';}else{regTab.classList.add('active');loginTab.classList.remove('active');loginFormDiv.style.display='none';registerFormDiv.style.display='block';}}
loginTab.addEventListener('click',()=>setActiveTab('login'));regTab.addEventListener('click',()=>setActiveTab('register'));
U('doLoginBtn').addEventListener('click',()=>{let user=U('loginUsername').value.trim(),pass=U('loginPassword').value.trim();if(!user||!pass)return alert('Wypełnij pola');if(login(user,pass)){currentUser=user;localStorage.setItem('bubble_current_user',user);showChatView();}else alert('❌ Nieprawidłowe dane');});
U('doRegisterBtn').addEventListener('click',()=>{let user=U('regUsername').value.trim(),pass=U('regPassword').value.trim(),conf=U('regConfirm').value.trim();if(!user||!pass)return alert('Nazwa i hasło wymagane');if(pass!==conf)return alert('Hasła różnią się');if(pass.length<3)return alert('Hasło minimum 3 znaki');if(register(user,pass)){alert('✅ Konto utworzone! Zalogowano.');currentUser=user;localStorage.setItem('bubble_current_user',user);showChatView();}else alert('❌ Użytkownik już istnieje');});
let savedUser=localStorage.getItem('bubble_current_user');if(savedUser&&getUsers().find(u=>u.username===savedUser)){currentUser=savedUser;showChatView();}else{showLoginView();}
})();
</script>
</body>
</html>
