<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bubble AI</title>

<style>

:root{
    --bg:#07111f;
    --bg2:#0c1b2f;
    --card:rgba(255,255,255,0.06);
    --text:#ffffff;
    --accent:#5cb8ff;
    --border:rgba(255,255,255,0.08);
}

body.light{
    --bg:#edf4ff;
    --bg2:#d9e7ff;
    --card:rgba(255,255,255,0.75);
    --text:#111;
    --accent:#267cff;
    --border:rgba(0,0,0,0.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    font-family:Segoe UI,sans-serif;
    background:
    radial-gradient(circle at top,var(--bg2),var(--bg));
    color:var(--text);
}

/* APP */

.app{
    display:flex;
    width:100%;
    height:100vh;
}

/* SIDEBAR */

.sidebar{
    width:300px;
    background:rgba(0,0,0,0.15);
    border-right:1px solid var(--border);
    backdrop-filter:blur(20px);
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:16px;
}

.logo{
    font-size:34px;
    font-weight:800;
    text-align:center;
    margin-bottom:10px;
}

.logo span{
    color:var(--accent);
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:22px;
    padding:18px;
    backdrop-filter:blur(10px);
}

.card h3{
    margin-bottom:14px;
    font-size:15px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    outline:none;
    background:rgba(255,255,255,0.08);
    color:var(--text);
    margin-bottom:10px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-weight:700;
    background:
    linear-gradient(
    135deg,
    #5ab2ff,
    #8f66ff
    );
    color:white;
    transition:0.2s;
}

button:hover{
    transform:scale(1.03);
}

.history{
    flex:1;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.history-item{
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    padding:12px;
    font-size:14px;
}

/* MAIN */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
    position:relative;
}

.topbar{
    height:80px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 25px;
    border-bottom:1px solid var(--border);
    backdrop-filter:blur(10px);
}

.model{
    font-size:18px;
    font-weight:700;
}

.user{
    background:var(--card);
    border:1px solid var(--border);
    padding:10px 16px;
    border-radius:12px;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:30px;
    display:flex;
    flex-direction:column;
    gap:18px;
}

/* MESSAGE */

.message{
    max-width:75%;
    padding:18px;
    border-radius:22px;
    line-height:1.6;
    animation:fade 0.25s ease;
}

.user-msg{
    align-self:flex-end;
    background:
    linear-gradient(
    135deg,
    #5ab2ff,
    #8f66ff
    );
    color:white;
}

.ai-msg{
    align-self:flex-start;
    background:var(--card);
    border:1px solid var(--border);
}

/* INPUT */

.bottom{
    padding:20px;
    display:flex;
    gap:12px;
    border-top:1px solid var(--border);
}

.bottom input{
    margin:0;
    flex:1;
}

.send-btn{
    width:auto;
    padding:14px 24px;
}

/* ANIM */

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* MOBILE */

@media(max-width:900px){

    .sidebar{
        display:none;
    }

    .message{
        max-width:90%;
    }

}

</style>
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo">
            Bubble<span>AI</span>
        </div>

        <div class="card">

            <h3>Login / Register</h3>

            <input
            type="text"
            id="username"
            placeholder="Username"
            >

            <input
            type="password"
            id="password"
            placeholder="Password"
            >

            <button onclick="login()">
                Continue
            </button>

        </div>

        <div class="card">

            <h3>Model</h3>

            <div class="history-item">
                Bubble-1.4
            </div>

        </div>

        <div class="card">

            <h3>Theme</h3>

            <button onclick="toggleTheme()">
                Dark / Light Mode
            </button>

        </div>

        <div class="card history" id="history">

            <h3>Chat History</h3>

        </div>

    </div>

    <!-- MAIN -->

    <div class="main">

        <div class="topbar">

            <div class="model">
                Bubble-1.4
            </div>

            <div class="user" id="userDisplay">
                Not logged
            </div>

        </div>

        <!-- CHAT -->

        <div class="chat" id="chat">

            <div class="message ai-msg">
                Hello ✨ I am Bubble-1.4
            </div>

        </div>

        <!-- INPUT -->

        <div class="bottom">

            <input
            type="text"
            id="messageInput"
            placeholder="Ask Bubble AI..."
            >

            <button
            class="send-btn"
            onclick="sendMessage()"
            >
                Send
            </button>

        </div>

    </div>

</div>

<script>

/* BACKEND URL */

const API_URL =
"https://bubble-ai-ivory.vercel.app/api/chat";

/* STORAGE */

let chats =
JSON.parse(
localStorage.getItem("bubbleHistory")
|| "[]"
);

let username =
localStorage.getItem("bubbleUser")
|| "";

/* INIT */

if(username){

    document
    .getElementById("userDisplay")
    .innerText = username;

}

renderHistory();

/* LOGIN */

function login(){

    const user =
    document
    .getElementById("username")
    .value
    .trim();

    const pass =
    document
    .getElementById("password")
    .value
    .trim();

    if(!user || !pass){
        alert("Fill all fields");
        return;
    }

    localStorage.setItem(
        "bubbleUser",
        user
    );

    username = user;

    document
    .getElementById("userDisplay")
    .innerText = user;

    alert("Logged in!");

}

/* THEME */

function toggleTheme(){

    document.body.classList.toggle("light");

    localStorage.setItem(
        "bubbleTheme",

        document.body.classList.contains("light")
        ? "light"
        : "dark"
    );

}

const savedTheme =
localStorage.getItem("bubbleTheme");

if(savedTheme === "light"){

    document.body.classList.add("light");

}

/* ADD MESSAGE */

function addMessage(text,type){

    const chat =
    document
    .getElementById("chat");

    const div =
    document.createElement("div");

    div.className =
    `message ${type}`;

    div.innerText = text;

    chat.appendChild(div);

    chat.scrollTop =
    chat.scrollHeight;

}

/* HISTORY */

function saveHistory(message){

    chats.unshift(message);

    if(chats.length > 20){

        chats.pop();

    }

    localStorage.setItem(
        "bubbleHistory",
        JSON.stringify(chats)
    );

    renderHistory();

}

function renderHistory(){

    const history =
    document
    .getElementById("history");

    history.innerHTML =
    "<h3>Chat History</h3>";

    chats.forEach(msg => {

        const div =
        document.createElement("div");

        div.className =
        "history-item";

        div.innerText = msg;

        history.appendChild(div);

    });

}

/* SEND MESSAGE */

async function sendMessage(){

    const input =
    document
    .getElementById("messageInput");

    const message =
    input.value.trim();

    if(!message) return;

    addMessage(
        message,
        "user-msg"
    );

    saveHistory(message);

    input.value = "";

    try{

        const response =
        await fetch(API_URL,{

            method:"POST",

            headers:{
                "Content-Type":
                "application/json"
            },

            body:JSON.stringify({
                message
            })

        });

        const data =
        await response.json();

        addMessage(
            data.reply ||
            "No response",
            "ai-msg"
        );

    }catch(err){

        addMessage(
            "Connection error.",
            "ai-msg"
        );

    }

}

/* ENTER */

document
.getElementById("messageInput")
.addEventListener(
"keydown",
e => {

    if(e.key === "Enter"){

        sendMessage();

    }

});

</script>

</body>
</html>
