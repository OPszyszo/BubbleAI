<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble AI - Your new AI</title>
    <style>
        :root {
            --bg-deep: #020b1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #0a1a3a 0%, #020b1a 70%);
            font-family: 'Segoe UI', 'Quicksand', 'Arial', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            position: relative;
        }

        /* Warstwa tekstu */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        .title {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 700;
            color: #ffffff;
            text-shadow:
                0 0 20px rgba(180, 220, 255, 0.7),
                0 0 60px rgba(140, 200, 255, 0.4),
                0 0 120px rgba(100, 180, 255, 0.3),
                0 4px 8px rgba(0, 0, 0, 0.5);
            letter-spacing: 0.05em;
            margin-bottom: 0.2em;
            animation: subtleGlow 3s ease-in-out infinite;
        }

        .countdown {
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            font-weight: 400;
            color: #c8e4ff;
            text-shadow:
                0 0 15px rgba(180, 220, 255, 0.8),
                0 0 40px rgba(130, 190, 255, 0.5),
                0 0 80px rgba(100, 160, 255, 0.3);
            letter-spacing: 0.08em;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
        }

        @keyframes subtleGlow {
            0%,
            100% {
                text-shadow: 0 0 20px rgba(180, 220, 255, 0.7), 0 0 60px rgba(140, 200, 255, 0.4), 0 0 120px rgba(100, 180, 255, 0.3), 0 4px 8px rgba(0, 0, 0, 0.5);
            }
            50% {
                text-shadow: 0 0 35px rgba(200, 235, 255, 0.9), 0 0 80px rgba(160, 220, 255, 0.6), 0 0 150px rgba(120, 200, 255, 0.5), 0 4px 8px rgba(0, 0, 0, 0.5);
            }
        }

        /* Canvas na bańki */
        #bubbleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="content">
        <h1 class="title">Bubble AI</h1>
        <div class="countdown" id="countdown">1d 0h 0m 0s</div>
    </div>

    <canvas id="bubbleCanvas"></canvas>

    <script>
        (function() {
            const canvas = document.getElementById('bubbleCanvas');
            const ctx = canvas.getContext('2d');
            const countdownEl = document.getElementById('countdown');

            // --- Cel odliczania: 29 maja 2026, godzina 13:30 (czas lokalny) ---
            const targetDate = new Date(2026, 4, 29, 13, 30, 0); // miesiące 0-11, więc 4 = maj

            function updateCountdown() {
                const now = new Date();
                let diff = targetDate - now;
                if (diff < 0) diff = 0;

                const totalSeconds = Math.floor(diff / 1000);
                const days = Math.floor(totalSeconds / 86400);
                const hours = Math.floor((totalSeconds % 86400) / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;

                countdownEl.textContent = `${days}d ${hours}h ${minutes}m ${seconds}s`;
            }
            updateCountdown();
            setInterval(updateCountdown, 1000);

            // --- Zarządzanie canvas ---
            let width, height;

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // --- Struktury danych ---
            const bubbles = [];
            const particles = []; // cząsteczki po pęknięciu bańki

            // --- Parametry ---
            const BUBBLE_SPAWN_INTERVAL = 350; // ms między nowymi bańkami
            const MIN_RADIUS = 25;
            const MAX_RADIUS = 90;
            const MIN_SPEED = 0.6;
            const MAX_SPEED = 2.2;
            const WOBBLE_AMPLITUDE = 40; // maks. wychylenie na boki (px)
            const WOBBLE_FREQUENCY = 0.003; // częstotliwość kołysania

            let lastSpawnTime = 0;
            let globalTime = 0;

            // --- Klasy ---
            class Bubble {
                constructor(x, y, radius, speed) {
                    this.x = x;
                    this.y = y;
                    this.radius = radius;
                    this.speed = speed;
                    this.baseX = x; // początkowa pozycja X do kołysania
                    this.wobbleAmp = WOBBLE_AMPLITUDE * (0.5 + Math.random() * 0.8);
                    this.wobbleFreq = WOBBLE_FREQUENCY * (0.7 + Math.random() * 0.6);
                    this.wobblePhase = Math.random() * Math.PI * 2;
                    this.alive = true;
                    // Kolory opalizacji – lekko losowe odcienie
                    this.hueShift = Math.random() * 40 - 20; // przesunięcie barwy
                }

                update(dt) {
                    this.y -= this.speed * (dt / 16); // normalizacja do ~60fps
                    // Kołysanie
                    this.x = this.baseX + Math.sin(globalTime * this.wobbleFreq + this.wobblePhase) * this
                    .wobbleAmp;

                    // Sprawdzenie pęknięcia u góry
                    if (this.y + this.radius < -10) {
                        this.alive = false;
                        this.burst();
                    }
                    // Dodatkowo jeśli wyjdzie poza bok, może pęknąć? Nie, tylko góra.
                }

                burst() {
                    const count = 6 + Math.floor(Math.random() * 8);
                    for (let i = 0; i < count; i++) {
                        const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
                        const dist = this.radius * (0.3 + Math.random() * 0.8);
                        const px = this.x + Math.cos(angle) * dist;
                        const py = this.y + Math.sin(angle) * dist;
                        const vx = Math.cos(angle) * (1.5 + Math.random() * 3);
                        const vy = Math.sin(angle) * (1.5 + Math.random() * 3) - 1; // lekko w górę lub w dół
                        particles.push(new Particle(px, py, vx, vy, this.radius * 0.12));
                    }
                }

                draw(ctx) {
                    const { x, y, radius } = this;
                    ctx.save();

                    // --- Główny okrąg bańki z opalizacją ---
                    // Gradient radialny z przesuniętym środkiem dla realistycznego wyglądu
                    const gradOffsetX = radius * 0.35;
                    const gradOffsetY = -radius * 0.3;
                    const gradient = ctx.createRadialGradient(
                        x - gradOffsetX, y - gradOffsetY, radius * 0.08,
                        x, y, radius
                    );
                    gradient.addColorStop(0, 'rgba(255,255,255,0)');
                    gradient.addColorStop(0.5, 'rgba(255,255,255,0)');
                    gradient.addColorStop(0.7, 'rgba(200,225,255,0.08)');
                    gradient.addColorStop(0.82, 'rgba(160,210,255,0.25)');
                    gradient.addColorStop(0.9, 'rgba(220,160,255,0.35)');
                    gradient.addColorStop(0.95, 'rgba(130,210,240,0.5)');
                    gradient.addColorStop(0.98, 'rgba(180,255,210,0.4)');
                    gradient.addColorStop(1, 'rgba(255,255,255,0.15)');

                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();

                    // --- Cienka obwódka (pierścień) ---
                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                    ctx.lineWidth = 1.2;
                    ctx.stroke();

                    // Drugi, delikatniejszy pierścień wewnątrz
                    ctx.beginPath();
                    ctx.arc(x, y, radius - 1.5, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(180,210,255,0.25)';
                    ctx.lineWidth = 0.8;
                    ctx.stroke();

                    // --- Refleksy światła ---
                    // Duży, miękki refleks
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    ctx.clip();

                    // Górny refleks – duży rozmyty
                    const reflGrad1 = ctx.createRadialGradient(
                        x - radius * 0.25, y - radius * 0.35, radius * 0.05,
                        x - radius * 0.1, y - radius * 0.2, radius * 0.55
                    );
                    reflGrad1.addColorStop(0, 'rgba(255,255,255,0.85)');
                    reflGrad1.addColorStop(0.3, 'rgba(255,255,255,0.5)');
                    reflGrad1.addColorStop(0.7, 'rgba(255,255,255,0.05)');
                    reflGrad1.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.fillStyle = reflGrad1;
                    ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);

                    // Mały ostry refleks (punkcik)
                    const dotX = x - radius * 0.28;
                    const dotY = y - radius * 0.42;
                    const dotR = radius * 0.06;
                    const dotGrad = ctx.createRadialGradient(dotX, dotY, 0, dotX, dotY, dotR);
                    dotGrad.addColorStop(0, 'rgba(255,255,255,1)');
                    dotGrad.addColorStop(0.5, 'rgba(255,255,255,0.9)');
                    dotGrad.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.fillStyle = dotGrad;
                    ctx.beginPath();
                    ctx.arc(dotX, dotY, dotR, 0, Math.PI * 2);
                    ctx.fill();

                    // Drugi mały refleks niżej
                    const dot2X = x + radius * 0.15;
                    const dot2Y = y - radius * 0.55;
                    const dot2R = radius * 0.04;
                    const dot2Grad = ctx.createRadialGradient(dot2X, dot2Y, 0, dot2X, dot2Y, dot2R);
                    dot2Grad.addColorStop(0, 'rgba(255,255,255,0.9)');
                    dot2Grad.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.fillStyle = dot2Grad;
                    ctx.beginPath();
                    ctx.arc(dot2X, dot2Y, dot2R, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.restore(); // clip

                    ctx.restore();
                }
            }

            class Particle {
                constructor(x, y, vx, vy, radius) {
                    this.x = x;
                    this.y = y;
                    this.vx = vx;
                    this.vy = vy;
                    this.radius = radius * (0.4 + Math.random() * 1.2);
                    this.life = 1.0; // 1 = pełne, 0 = martwe
                    this.decay = 0.015 + Math.random() * 0.035;
                    this.gravity = 0.08;
                }

                update(dt) {
                    const factor = dt / 16;
                    this.x += this.vx * factor;
                    this.y += this.vy * factor;
                    this.vy += this.gravity * factor;
                    this.life -= this.decay * factor;
                }

                get alive() {
                    return this.life > 0;
                }

                draw(ctx) {
                    const alpha = this.life * 0.8;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                    grad.addColorStop(0, 'rgba(255,255,255,0.9)');
                    grad.addColorStop(0.4, 'rgba(200,230,255,0.6)');
                    grad.addColorStop(1, 'rgba(150,200,255,0)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            // --- Funkcja spawnująca bańkę ---
            function spawnBubble() {
                const radius = MIN_RADIUS + Math.random() * (MAX_RADIUS - MIN_RADIUS);
                const x = radius + Math.random() * (width - radius * 2);
                const y = height + radius + 10;
                const speed = MIN_SPEED + Math.random() * (MAX_SPEED - MIN_SPEED);
                bubbles.push(new Bubble(x, y, radius, speed));
            }

            // --- Pętla animacji ---
            let lastFrameTime = performance.now();

            function animate(timestamp) {
                let dt = timestamp - lastFrameTime;
                if (dt <= 0) dt = 16;
                if (dt > 100) dt = 100; // ograniczenie przy dużych lagach
                lastFrameTime = timestamp;
                globalTime += dt;

                // Spawn nowych baniek
                if (timestamp - lastSpawnTime > BUBBLE_SPAWN_INTERVAL) {
                    lastSpawnTime = timestamp;
                    spawnBubble();
                    // Czasem spawn podwójny
                    if (Math.random() < 0.3) {
                        setTimeout(() => {
                            if (bubbles.length < 25) spawnBubble();
                        }, 80 + Math.random() * 150);
                    }
                }

                // Aktualizacja baniek
                for (let i = bubbles.length - 1; i >= 0; i--) {
                    const b = bubbles[i];
                    b.update(dt);
                    if (!b.alive) {
                        bubbles.splice(i, 1);
                    }
                }

                // Aktualizacja cząsteczek
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.update(dt);
                    if (!p.alive) {
                        particles.splice(i, 1);
                    }
                }

                // Rysowanie
                ctx.clearRect(0, 0, width, height);

                // Sortowanie baniek wg y (dalsze pierwsze) – dla realistycznego nachodzenia
                // (choć przezroczystość sprawia, że to mniej istotne)
                const sortedBubbles = [...bubbles].sort((a, b) => a.y - b.y);

                for (const b of sortedBubbles) {
                    b.draw(ctx);
                }

                for (const p of particles) {
                    p.draw(ctx);
                }

                requestAnimationFrame(animate);
            }

            // Start
            // Na początku tworzymy kilka baniek, żeby nie było pusto
            for (let i = 0; i < 5; i++) {
                const radius = MIN_RADIUS + Math.random() * (MAX_RADIUS - MIN_RADIUS);
                const x = radius + Math.random() * (width - radius * 2);
                const y = height * Math.random(); // rozrzucone po ekranie
                const speed = MIN_SPEED + Math.random() * (MAX_SPEED - MIN_SPEED);
                bubbles.push(new Bubble(x, y, radius, speed));
            }
            lastSpawnTime = performance.now();

            requestAnimationFrame(animate);
        })();
    </script>
</body>
</html>
